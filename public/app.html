<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<!-- Lo zoom del browser NON si disabilita: chi ha problemi di vista deve poter
     ingrandire. Il pinch sulla mappa è gestito dall'app sul suo SVG (touch-action:none),
     quindi non serve bloccare quello di sistema per evitare conflitti. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runebog GM — Diario del GM</title>

<!-- Sorgente unica dei colori, condivisa col sito. Un tema si scrive una volta
     sola in themes.css e vale qui e là. -->
<link rel="stylesheet" href="/themes.css">
<script>
  // Prima del disegno, o si vede un lampo del tema sbagliato al caricamento.
  try{ var t = localStorage.getItem("runebog-theme");
       if(t && t !== "torbiera") document.documentElement.dataset.theme = t; }catch(e){}
</script>

<style>
  /* I nomi storici dell'app restano, ma sono ALIAS dei token condivisi: così le
     ~400 righe di CSS qui sotto non vanno riscritte e seguono comunque i temi. */
  :root{
    --bog:      var(--peat);
    --bog-2:    var(--peat-sunk);
    --panel:    var(--surface);
    --panel-2:  var(--surface-hi);
    --line:     var(--edge);
    --ink:      var(--parchment);
    --ink-dim:  var(--parchment-dim);
    --fen:      var(--moss);
    --fen-dim:  var(--moss-deep);
    --gold:     var(--lantern);
    /* --ember ha già lo stesso nome nei token condivisi: ridichiararlo come
       var(--ember) sarebbe un riferimento circolare, e si annullerebbe. */
    --teal:     var(--wisp);
    --viola:    var(--arcane);
    --grigio:   var(--parchment-mute);
    --r:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 800px at 30% -10%, var(--glow) 0%, var(--bog) 60%);
    color:var(--ink);
    font:15px/1.5 -apple-system, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow:hidden;
  }
  h1,h2,h3,.serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  input,textarea,select{
    font:inherit;color:var(--ink);background:var(--bog-2);
    border:1px solid var(--line);border-radius:6px;padding:7px 9px;width:100%;
  }
  input:focus,textarea:focus,select:focus,button:focus-visible{outline:2px solid var(--fen-dim);outline-offset:1px}
  textarea{resize:vertical;min-height:90px}
  ::placeholder{color:var(--grigio)}

  /* ---------- top bar ---------- */
  #topbar{
    display:flex;align-items:center;gap:16px;
    padding:10px 18px;border-bottom:1px solid var(--line);
    background:color-mix(in srgb, var(--bog) 85%, transparent);backdrop-filter:blur(6px);
  }
  #topbar h1{font-size:20px;letter-spacing:.06em;color:var(--fen)}
  #topbar h1 small{color:var(--ink-dim);font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-left:8px}
  nav.tabs{display:flex;gap:4px;margin-left:12px}
  nav.tabs button{
    padding:7px 14px;border-radius:8px;color:var(--ink-dim);
    letter-spacing:.03em;
  }
  nav.tabs button.active{background:var(--panel-2);color:var(--fen)}
  nav.tabs button:hover{color:var(--ink)}
  #topbar .spacer{flex:1}
  #savestate{font-size:12px;color:var(--ink-dim)}
  .btn{
    padding:7px 13px;border:1px solid var(--line);border-radius:8px;
    background:var(--panel);color:var(--ink);font-size:13px;
  }
  .btn:hover{border-color:var(--fen-dim);color:var(--fen)}
  .btn.primary{background:var(--fen-dim);border-color:var(--fen-dim);color:var(--bog);font-weight:600}
  .btn.primary:hover{background:var(--fen);color:var(--bog)}
  .btn.danger:hover{border-color:var(--ember);color:var(--ember)}

  /* ---------- layout ---------- */
  main{height:calc(100vh - 53px)}
  .view{display:none;height:100%}
  .view.active{display:flex}

  /* ---------- mappa ---------- */
  #view-map{flex-direction:row}
  #map-left{flex:1;display:flex;flex-direction:column;min-width:0}
  #crumbs{
    display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    padding:10px 18px;font-size:14px;
  }
  #crumbs button{color:var(--ink-dim);padding:2px 4px;border-radius:4px}
  #crumbs button:hover{color:var(--fen)}
  #crumbs .sep{color:var(--grigio)}
  #crumbs .here{color:var(--fen);font-weight:600}
  #canvas-wrap{flex:1;position:relative;overflow:hidden}
  #canvas{width:100%;height:100%;display:block}
  #canvas-hint{
    position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
    font-size:12px;color:var(--ink-dim);background:color-mix(in srgb, var(--bog) 78%, transparent);
    padding:4px 12px;border-radius:20px;pointer-events:none;white-space:nowrap;
  }
  #empty-node{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;color:var(--ink-dim);
  }
  #empty-node.show{display:flex}

  /* bolle */
  .bubble{cursor:pointer}
  .bubble circle.body{transition:filter .15s}
  .bubble:hover circle.body{filter:brightness(1.25)}
  .bubble.selected circle.ring{stroke-width:2.5;opacity:1}
  .bubble text{fill:var(--ink);pointer-events:none;font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
  .bubble text.count{fill:var(--ink-dim);font-family:-apple-system,Helvetica,sans-serif}
  .bubble .status-dot{pointer-events:none}
  .rune-ring{pointer-events:none}
  @media (prefers-reduced-motion:no-preference){
    .rune-ring{animation:slowspin 90s linear infinite;transform-origin:center}
    @keyframes slowspin{to{transform:rotate(360deg)}}
  }

  /* ---------- pannello dettaglio ---------- */
  #detail{
    width:380px;max-width:42vw;border-left:1px solid var(--line);
    background:var(--panel);display:flex;flex-direction:column;overflow-y:auto;
  }
  #detail .inner{padding:18px;display:flex;flex-direction:column;gap:14px}
  #detail .empty{padding:30px 20px;color:var(--ink-dim);text-align:center}
  .field label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:5px}
  .row{display:flex;gap:10px}
  .row>.field{flex:1}
  .type-badge{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:baseline}
  #detail-img{width:100%;border-radius:var(--r);border:1px solid var(--line);display:none;cursor:zoom-in}
  #detail-img.show{display:block}
  .img-actions{display:flex;gap:8px}
  #detail h2{font-size:19px;color:var(--fen)}
  .detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;padding-top:14px;border-top:1px solid var(--line)}
  .child-list{display:flex;flex-direction:column;gap:6px}
  .child-list .child{
    display:flex;align-items:center;gap:8px;padding:7px 10px;
    background:var(--bog-2);border:1px solid var(--line);border-radius:8px;
    cursor:pointer;font-size:14px;
  }
  .child-list .child:hover{border-color:var(--fen-dim)}
  .child-list .child .st{margin-left:auto;font-size:11px;color:var(--ink-dim)}

  /* lightbox immagine */
  #lightbox{
    position:fixed;inset:0;background:rgba(6,10,8,.92);display:none;
    align-items:center;justify-content:center;z-index:50;cursor:zoom-out;
  }
  #lightbox.show{display:flex}
  #lightbox img{max-width:94vw;max-height:94vh;border-radius:8px}

  /* ---------- checklist ---------- */
  #view-check{flex-direction:column;align-items:center;overflow-y:auto}
  .narrow{width:min(680px,92vw);padding:28px 0 60px}
  .narrow h2{font-size:22px;color:var(--fen);margin-bottom:4px}
  .narrow .sub{color:var(--ink-dim);margin-bottom:20px;font-size:14px}
  #check-add{display:flex;gap:8px;margin-bottom:18px}
  #check-list{display:flex;flex-direction:column;gap:6px}
  .check-item{
    display:flex;align-items:center;gap:12px;padding:10px 14px;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  }
  .check-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--fen-dim);flex:none;cursor:pointer}
  .check-item .txt{flex:1}
  .check-item.done .txt{color:var(--ink-dim);text-decoration:line-through}
  .icon-btn{color:var(--ink-dim);padding:4px 8px;border-radius:6px;font-size:15px;flex:none}
  .icon-btn:hover{color:var(--ember)}
  #check-progress{font-size:13px;color:var(--ink-dim);margin-bottom:10px}

  /* ---------- giocatori ---------- */
  #view-players{flex-direction:column;align-items:center;overflow-y:auto}
  #players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;width:min(980px,94vw);padding-bottom:60px}
  .pcard{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
    padding:16px;display:flex;flex-direction:column;gap:10px;
  }
  .pcard .head{display:flex;align-items:baseline;gap:8px}
  .pcard input.pname{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-size:17px;font-weight:600;background:none;border:none;border-bottom:1px dashed transparent;border-radius:0;padding:2px 0;color:var(--fen)}
  .pcard input.pname:hover,.pcard input.pname:focus{border-bottom-color:var(--line)}
  .pcard input.pclass{background:none;border:none;border-bottom:1px dashed transparent;border-radius:0;padding:2px 0;font-size:13px;color:var(--ink-dim)}
  .pcard input.pclass:hover,.pcard input.pclass:focus{border-bottom-color:var(--line)}
  .hp-block{display:flex;align-items:center;gap:8px}
  .hp-block .hp-btn{
    width:30px;height:30px;border:1px solid var(--line);border-radius:8px;
    background:var(--bog-2);font-size:16px;font-weight:700;flex:none;
  }
  .hp-block .hp-btn:hover{border-color:var(--fen-dim)}
  .hp-bar{flex:1;height:10px;background:var(--bog-2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .hp-bar i{display:block;height:100%;background:var(--fen-dim);transition:width .2s,background .2s}
  .hp-bar i.low{background:var(--ember)}
  .hp-num{font-size:13px;min-width:64px;text-align:right;color:var(--ink-dim)}
  .hp-num input{width:34px;padding:2px 4px;text-align:center;font-size:13px}
  .pcard textarea{min-height:60px;font-size:13px}
  .pcard .foot{display:flex;justify-content:flex-end}
  #players-add{margin:26px 0 18px}

  /* ---------- dialog conferma ---------- */
  dialog{
    background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:var(--r);padding:20px;max-width:360px;
  }
  dialog::backdrop{background:rgba(6,10,8,.7)}
  dialog .d-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

  /* ---------- pianta (costruttore mappa città) ---------- */
  #plan-wrap, #plan-svg, #plan-svg text, #plan-toolbar, #crumbs{
    user-select:none; -webkit-user-select:none;
  }
  #view-plan{display:none;height:100%}
  #view-plan.active{display:flex}
  #plan-left{flex:1;display:flex;flex-direction:column;min-width:0}
  #plan-toolbar{display:flex;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .pal-title{font-size:12px;color:var(--ink-dim);letter-spacing:.06em;text-transform:uppercase}
  .pal-sep{flex:1}
  .pal-item{display:flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--line);border-radius:8px;
    background:var(--panel);cursor:grab;font-size:13px;color:var(--ink);user-select:none;
    touch-action:manipulation}
  .pal-item:hover{border-color:var(--fen-dim);color:var(--fen)}
  .pal-item:active{cursor:grabbing}
  .pal-item svg{display:block}
  /* Armato: il prossimo tocco sulla mappa piazza questo elemento. */
  .pal-item.armed{border-color:var(--fen);color:var(--fen);background:var(--panel-2);
    box-shadow:0 0 0 1px var(--fen) inset}
  #plan-svg.arming{cursor:copy}
  #plan-wrap{flex:1;position:relative;overflow:hidden}
  #plan-svg{width:100%;height:100%;display:block;touch-action:none;cursor:default}
  #plan-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--ink-dim);
    background:color-mix(in srgb, var(--bog) 85%, transparent);padding:5px 12px;border-radius:8px;border:1px solid var(--line);
    max-width:92%;text-align:center;pointer-events:none}
  #plan-side{width:300px;flex:none;border-left:1px solid var(--line);padding:16px;overflow-y:auto;background:var(--panel)}
  #plan-side h3{font-size:15px;color:var(--fen);margin-bottom:4px}
  #plan-side label{display:block;font-size:11px;color:var(--ink-dim);letter-spacing:.06em;text-transform:uppercase;margin:12px 0 4px}
  #plan-side input,#plan-side select,#plan-side textarea{width:100%}
  #plan-side .side-empty{color:var(--ink-dim);font-size:13px;margin-top:8px}
  .blk{cursor:grab}
  .blk.dragging{cursor:grabbing}
  /* I blocchi poggiano sulla torbiera invece di galleggiarci sopra piatti: un'ombra
     appena accennata dà profondità, e la selezione si accende di lanterna.
     Solo filter/opacity: nessuna proprietà che costringa a ricalcolare il layout. */
  .blk .blk-shape{
    fill:var(--panel);stroke:var(--c, var(--fen));stroke-width:2;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.45));
    transition:filter .15s, stroke .15s;
  }
  .blk:hover .blk-shape{filter:brightness(1.18) drop-shadow(0 3px 7px rgba(0,0,0,.55))}
  .blk.sel .blk-shape{
    stroke:var(--gold);stroke-width:3;
    filter:drop-shadow(0 0 7px rgba(216,178,90,.45)) drop-shadow(0 2px 4px rgba(0,0,0,.5));
  }
  .blk text{font-size:13px;fill:var(--ink);pointer-events:none;font-family:"Iowan Old Style",Palatino,Georgia,serif}
  .blk .link-handle{fill:var(--panel);stroke:var(--fen-dim);stroke-width:2;cursor:crosshair;opacity:0}
  .blk:hover .link-handle,.blk.sel .link-handle{opacity:1}
  /* Senza hover (tablet) la maniglia resterebbe invisibile per sempre e i
     collegamenti sarebbero impossibili: sul blocco selezionato mostrala sempre. */
  @media (hover:none){
    .blk.sel .link-handle{opacity:1}
    .blk .link-handle{r:11}
  }
  .blk .link-handle:hover{fill:var(--fen-dim)}
  .edge{cursor:pointer}
  .edge .edge-hit{stroke:transparent;stroke-width:16;fill:none}
  .edge.sel .edge-line{filter:drop-shadow(0 0 3px var(--gold))}
  .edge text{font-size:11px;fill:var(--ink-dim);pointer-events:none;paint-order:stroke;stroke:var(--bog);stroke-width:3px}
  .rs-handle{fill:var(--gold);stroke:var(--bog);stroke-width:2;cursor:nwse-resize}

  /* ---------- schede mostro ---------- */
  .btn.tiny{padding:2px 8px;font-size:12px;min-width:0;line-height:1.4}
  .statblock label,.statblock-empty label{margin-top:12px}
  .statblock > .row{margin-top:6px}
  .foe-list{margin:8px 0;border:1px solid var(--line);border-radius:10px;padding:8px;background:var(--bg)}
  .foe-head{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ink-dim);
    letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
  .foe-card{border:1px solid var(--line);border-radius:8px;padding:8px;background:var(--panel);margin-bottom:7px}
  .foe-card:last-child{margin-bottom:0}
  .foe-card.dead{opacity:.5}
  .foe-card.dead .foe-name{text-decoration:line-through}
  .foe-top{display:flex;gap:6px;align-items:center}
  .foe-name{flex:1;font-weight:600}
  .foe-hp{display:flex;align-items:center;gap:5px;margin-top:6px}
  .hpbar{flex:1;height:9px;border-radius:5px;background:var(--line);overflow:hidden}
  .hpbar-fill{height:100%;border-radius:5px;transition:width .15s,background .15s}
  .foe-hp .hp-now,.foe-hp .hp-max{width:46px;text-align:center;padding:3px 4px;font-size:13px}
  .foe-hp .hp-sep{color:var(--ink-dim)}
  .foe-line{display:flex;gap:5px;align-items:center;margin-top:6px}
  .foe-line > input:first-child{flex:1}
  .foe-armor{width:44px;text-align:center;padding:3px 4px}
  .foe-armlbl{font-size:13px}
  .foe-tags{width:100%;margin-top:6px;font-size:12px}
  .mon-sm{min-height:52px}
  .mon-meta{width:100%;margin-top:6px;font-style:italic}
  .ab-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:10px}
  .ab-cell{text-align:center}
  .ab-cell label{font-size:10px;margin:0 0 2px}
  .ab-cell input{width:100%;text-align:center;padding:4px 2px;font-size:13px}
  .ab-mod{display:block;font-size:11px;color:var(--ink-dim);margin-top:2px}
  .srd-wrap{position:relative;margin-top:6px}
  #srd-search{width:100%}
  #srd-results{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:40;display:none;
    background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:4px;
    max-height:260px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  #srd-results.show{display:block}
  #srd-results button{display:flex;justify-content:space-between;gap:8px;width:100%;text-align:left;
    padding:7px 10px;border-radius:6px;font-size:13px;color:var(--ink)}
  #srd-results button:hover{background:var(--panel);color:var(--fen)}
  .srd-cr{font-size:11px;color:var(--ink-dim);white-space:nowrap}
  .srd-attrib{font-size:10px;color:var(--ink-dim);margin-top:8px}
  .dice-bar{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:6px}
  .dice-bar input{width:80px;padding:4px 6px;font-size:13px}
  #dice-out{font-size:14px;color:var(--gold);margin-left:4px}
  .dice-detail{font-size:11px;color:var(--ink-dim)}

  /* ---------- selettore campagne ---------- */
  #camp-wrap{display:flex;gap:5px;align-items:center;margin-left:14px}
  #campaign-select{max-width:180px;font-size:13px;padding:5px 8px}

  /* ---------- swatch token ---------- */
  .swatches{display:flex;gap:7px}
  .swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer}
  .swatch.on{border-color:var(--gold);box-shadow:0 0 0 2px var(--bog) inset}
  .blk.token .blk-shape{stroke-width:2.5}

  /* ---------- diario quest ---------- */
  #view-quests{overflow-y:auto}
  #quests-list{max-width:760px;margin:0 auto;padding:26px 20px 60px}
  .q-h{font-size:15px;color:var(--fen);letter-spacing:.06em;text-transform:uppercase;margin:26px 0 10px}
  .q-h:first-child{margin-top:0}
  .q-empty{color:var(--ink-dim);font-size:13px}
  .q-row{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;margin-bottom:8px;background:var(--panel)}
  .q-row.done{opacity:.55}
  .q-row.done .q-title{text-decoration:line-through}
  .q-star{font-size:18px;line-height:1;color:var(--line);padding:2px 4px}
  .q-star.on{color:var(--gold)}
  .q-star:hover{color:var(--gold)}
  .q-body{flex:1;min-width:0}
  .q-title{color:var(--ink);font-weight:600;cursor:pointer}
  .q-title:hover{color:var(--fen);text-decoration:underline}
  .q-loc{margin-left:8px;font-size:11px;color:var(--ink-dim)}
  .q-notes{font-size:12px;color:var(--ink-dim);margin-top:3px}
  .q-status{font-size:12px;padding:4px 6px}

  /* ---------- ricerca rapida ---------- */
  #qs-wrap{position:relative}
  #quick-search{width:200px;font-size:13px;padding:6px 10px}
  #qs-results{
    position:absolute;top:calc(100% + 6px);right:0;min-width:290px;max-height:330px;overflow-y:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);padding:5px;display:none;z-index:55;
  }
  #qs-results.show{display:block}
  #qs-results button{
    display:flex;align-items:center;gap:8px;width:100%;text-align:left;
    padding:7px 10px;border-radius:7px;font-size:13px;color:var(--ink);
  }
  #qs-results button:hover,#qs-results button.active{background:var(--panel-2);color:var(--fen)}
  #qs-results .qs-path{margin-left:auto;font-size:11px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:45%}

  /* ---------- menu contestuale ---------- */
  #ctx-menu{
    position:fixed;z-index:60;min-width:190px;display:none;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);padding:5px;
  }
  #ctx-menu.show{display:block}
  #ctx-menu .ctx-head{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);padding:6px 10px 3px}
  #ctx-menu button{
    display:flex;align-items:center;gap:8px;width:100%;text-align:left;
    padding:7px 10px;border-radius:7px;font-size:13px;color:var(--ink);
  }
  #ctx-menu button:hover{background:var(--panel-2);color:var(--fen)}
  #ctx-menu button.danger:hover{color:var(--ember)}
  #ctx-menu hr{border:none;border-top:1px solid var(--line);margin:5px 4px}
  #ctx-menu .dot{width:9px;height:9px;border-radius:50%;flex:none}
  #ctx-menu .bar{width:16px;height:0;border-top:3px solid;border-radius:2px;flex:none}

  /* ---------- tema ---------- */
  #theme-wrap select{width:auto;padding:6px 8px;font-size:13px;background:var(--panel);cursor:pointer}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0 0 0 0);white-space:nowrap;border:0}

  /* ---------- puntatore grosso (dito): bersagli da 44px ----------
     Su POINTER, non su larghezza: un iPad in orizzontale è 1024px — largo come un
     laptop, ma si tocca col dito. Il desktop resta compatto com'è. */
  button, .pal-item, .check-item input[type=checkbox]{touch-action:manipulation}

  @media (pointer:coarse){
    .btn, nav.tabs button, #ctx-menu button{min-height:44px}
    .btn{min-width:44px}   /* i bottoni a un solo carattere (zoom ＋ －) restavano a 41px */
    .btn.tiny{min-width:44px;min-height:44px;font-size:15px}
    .icon-btn{min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
    .hp-block .hp-btn{width:44px;height:44px}
    .pal-item{min-height:44px}
    .child-list .child{padding:11px 10px}
    .check-item input[type=checkbox]{width:24px;height:24px}
  }

  /* ---------- mobile: elementi base (nascosti su desktop) ---------- */
  .sheet-close{display:none}
  #detail-fab{display:none}

  @media (max-width:760px){
    body{display:flex;flex-direction:column;height:100dvh;overflow:hidden;overscroll-behavior:none}
    main{flex:1;min-height:0;height:auto}

    /* topbar compatta */
    #topbar{flex-wrap:wrap;gap:6px;padding:8px 10px}
    #topbar h1{font-size:16px}
    #topbar h1 small{display:none}
    #camp-wrap{margin-left:0}
    #campaign-select{max-width:120px}
    .tabs button{padding:6px 10px;font-size:13px}
    #quick-search{width:110px}
    #savestate{font-size:11px}

    /* palette scorrevole in orizzontale */
    #plan-toolbar{overflow-x:auto;flex-wrap:nowrap;padding:8px 10px;scrollbar-width:none}
    #plan-toolbar::-webkit-scrollbar{display:none}
    .pal-item{flex:none}
    #plan-hint{display:none}
    #plan-wrap *{-webkit-touch-callout:none}

    /* pannello dettagli = bottom sheet */
    #detail{
      position:fixed;left:0;right:0;bottom:0;top:auto;width:auto;max-width:none;
      max-height:62dvh;border-left:none;border-top:1px solid var(--line);
      border-radius:16px 16px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.6);
      transform:translateY(105%);transition:transform .22s ease;z-index:30;overflow-y:auto;
    }
    #detail.open{transform:translateY(0)}
    .sheet-close{
      display:flex;position:sticky;top:0;margin:0 0 4px auto;z-index:5;
      background:var(--panel-2);
    }

    /* pulsante flottante per i dettagli del livello */
    #detail-fab{
      display:flex;align-items:center;justify-content:center;
      position:absolute;right:14px;bottom:14px;z-index:20;
      width:48px;height:48px;border-radius:50%;
      background:var(--fen-dim);color:var(--bog);font-size:20px;
      box-shadow:0 6px 18px rgba(0,0,0,.5);
    }

    /* statblock: caratteristiche su 3 colonne */
    .ab-grid{grid-template-columns:repeat(3,1fr)}
    /* liste e pannelli con più aria per i pollici */
    .btn{padding:8px 12px}
    .btn.tiny{padding:5px 9px}
  }
</style>
</head>
<body>

<header id="topbar">
  <h1>Runebog <small>GM · Diario del GM</small></h1>
  <div id="camp-wrap">
    <select id="campaign-select" onchange="switchCampaign(this.value)" title="Campagna attiva"></select>
    <button class="btn tiny" title="Nuova campagna" onclick="newCampaign()">＋</button>
    <button class="btn tiny danger" title="Elimina campagna" onclick="askDeleteCampaign()">🗑</button>
  </div>
  <nav class="tabs" role="tablist">
    <button id="tab-map" class="active" onclick="showView('map')">Mappa</button>
    <button id="tab-quests" onclick="showView('quests')">Quest</button>
    <button id="tab-check" onclick="showView('check')">Checklist</button>
    <button id="tab-players" onclick="showView('players')">Giocatori</button>
  </nav>
  <div class="spacer"></div>
  <div id="qs-wrap">
    <input id="quick-search" type="search" placeholder="Cerca… (Ctrl+K)" autocomplete="off">
    <div id="qs-results"></div>
  </div>
  <span id="savestate"></span>
  <label id="theme-wrap" title="Tema">
    <span class="sr-only">Tema</span>
    <select id="theme-select" onchange="setTheme(this.value)">
      <option value="torbiera">Torbiera</option>
      <option value="pergamena">Pergamena</option>
      <option value="cripta">Cripta</option>
      <option value="brace">Brace</option>
      <option value="contrasto">Alto contrasto</option>
    </select>
  </label>
  <button class="btn" onclick="exportJSON()">Esporta</button>
  <button class="btn" onclick="window.desktop ? importJSONDesktop() : document.getElementById('import-file').click()">Importa</button>
  <input type="file" id="import-file" accept=".json,application/json" hidden>
</header>

<main>
  <!-- ============ MAPPA (spaziale gerarchica) ============ -->
  <section id="view-map" class="view active">
    <div id="map-left">
      <div id="crumbs"></div>
      <div id="plan-toolbar">
        <span class="pal-title">Blocchi:</span>
        <div class="pal-item" draggable="true" data-pal='{"shape":"quartiere"}'><svg width="26" height="18"><rect x="1" y="1" width="24" height="16" rx="3" fill="none" style="stroke:var(--fen)" stroke-width="2"/></svg>Quartiere</div>
        <div class="pal-item" draggable="true" data-pal='{"shape":"edificio"}'><svg width="24" height="18"><rect x="2" y="3" width="20" height="12" rx="2" fill="none" style="stroke:var(--teal)" stroke-width="2"/></svg>Edificio</div>
        <div class="pal-item" draggable="true" data-pal='{"shape":"stanza"}'><svg width="18" height="18"><rect x="2" y="2" width="14" height="14" rx="2" fill="none" style="stroke:var(--teal)" stroke-width="2"/></svg>Stanza</div>
        <div class="pal-item" draggable="true" data-pal='{"shape":"piazza"}'><svg width="18" height="18"><circle cx="9" cy="9" r="7" fill="none" style="stroke:var(--teal)" stroke-width="2"/></svg>Piazza</div>
        <div class="pal-item" draggable="true" data-pal='{"shape":"torre"}'><svg width="18" height="18"><polygon points="9,1 17,9 9,17 1,9" fill="none" style="stroke:var(--teal)" stroke-width="2"/></svg>Torre</div>
        <span class="pal-title" style="margin-left:6px">Segnalini:</span>
        <div class="pal-item" draggable="true" data-pal='{"marker":"quest"}'><span class="type-badge" style="background:var(--gold)"></span>Quest</div>
        <div class="pal-item" draggable="true" data-pal='{"marker":"encounter"}'><span class="type-badge" style="background:var(--ember)"></span>Encounter</div>
        <div class="pal-item" draggable="true" data-pal='{"marker":"png"}'><span class="type-badge" style="background:var(--viola)"></span>PNG</div>
        <div class="pal-item" draggable="true" data-pal='{"marker":"nota"}'><span class="type-badge" style="background:var(--grigio)"></span>Nota</div>
        <div class="pal-item" draggable="true" data-pal='{"marker":"token"}'><span class="type-badge" style="background:var(--ink)"></span>Token</div>
        <span class="pal-sep"></span>
        <button class="btn" onclick="planZoom(1.25)">＋</button>
        <button class="btn" onclick="planZoom(0.8)">－</button>
        <button class="btn" onclick="arrangeGrid()" title="Dispone i blocchi in griglia allineata">Ordina</button>
        <button class="btn" onclick="planFit(true)">Adatta</button>
      </div>
      <div id="plan-wrap">
        <svg id="plan-svg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="empty-node">
          <p class="serif" style="font-size:18px">Questo livello è ancora vuoto.</p>
          <p style="color:var(--ink-dim);font-size:13px;max-width:340px;text-align:center">Trascina qui un blocco o un segnalino dalla barra, oppure fai doppio clic sulla tela.</p>
          <button class="btn primary" onclick="quickAddCenter()">+ Aggiungi blocco</button>
        </div>
        <div id="plan-hint"></div>
        <button id="detail-fab" title="Dettagli del livello" onclick="openDetailSheet()">✎</button>
      </div>
    </div>
    <aside id="detail"></aside>
  </section>

  <!-- ============ QUEST ============ -->
  <section id="view-quests" class="view">
    <div id="quests-list"></div>
  </section>

  <!-- ============ CHECKLIST ============ -->
  <section id="view-check" class="view">
    <div class="narrow">
      <h2>Checklist</h2>
      <p class="sub">Cose da preparare e da non dimenticare al tavolo.</p>
      <div id="check-progress"></div>
      <div id="check-add">
        <input id="check-input" placeholder="Nuova voce… (Invio per aggiungere)">
        <button class="btn primary" onclick="addCheck()">Aggiungi</button>
      </div>
      <div id="check-list"></div>
    </div>
  </section>

  <!-- ============ GIOCATORI ============ -->
  <section id="view-players" class="view">
    <button id="players-add" class="btn primary" onclick="addPlayer()">+ Aggiungi giocatore</button>
    <div id="players-grid"></div>
  </section>
</main>

<div id="ctx-menu"></div>

<div id="lightbox" onclick="this.classList.remove('show')"><img id="lightbox-img" alt="Mappa di riferimento"></div>

<dialog id="confirm-dialog">
  <p id="confirm-text" class="serif" style="font-size:16px"></p>
  <div class="d-actions">
    <button class="btn" onclick="closeConfirm(false)">Annulla</button>
    <button class="btn danger" id="confirm-yes" onclick="closeConfirm(true)">Elimina</button>
  </div>
</dialog>

ker casts the Mirror Image spell, requiring no spell components and using Wisdom as the spellcasting ability. The spell ends early if the cloaker starts or ends its turn in Bright Light.","legendary":""},{"name":"Cloud Giant","meta":"Huge giant, neutral","ac":"14 (natural armor)","hp":200,"hpRoll":"16d12 + 96","speed":"12 m, volare 6 m, (fluttuare)","str":27,"dex":10,"con":22,"int":12,"wis":16,"cha":16,"saves":"Cos +10, Sag +7","skills":"Intuizione +7, Percezione +11","resist":"","senses":"Percezione passiva 21","langs":"Common, Giant","cr":"9 (5000 PE)","traits":"","actions":"Multiattack. The giant makes two attacks, using Thunderous Mace or Thundercloud in any combination. It can replace one attack with a use of Spellcasting to cast Fog Cloud.\nSpellcasting. The giant casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 15):\n\n- **At Will:** Detect Magic, Fog Cloud, Light\n- **1/Day Each:** Control Weather, Gaseous Form, Telekinesis\nThundercloud. Ranged Attack Roll: +12, range 240 ft. 18 (3d6 + 8) Thunder damage, and the target has the Incapacitated condition until the end of its next turn.\nThunderous Mace. Melee Attack Roll: +12, reach 10 ft. 21 (3d8 + 8) Bludgeoning damage plus 7 (2d6) Thunder damage.\nAZIONI BONUS:\nMisty Step. The giant casts the Misty Step spell, using the same spellcasting ability as Spellcasting.","legendary":""},{"name":"Cockatrice","meta":"Small monstrosity, unaligned","ac":"11 (natural armor)","hp":22,"hpRoll":"5d6 + 5","speed":"6 m, volare 12 m","str":6,"dex":12,"con":12,"int":2,"wis":13,"cha":5,"saves":"","skills":"","resist":"","senses":"scurovisione 18 m, Percezione passiva 11","langs":"","cr":"1/2 (100 PE)","traits":"","actions":"Petrifying Bite. Melee Attack Roll: +3, reach 5 ft. 3 (1d4 + 1) Piercing damage. If the target is a creature, it is subjected to the following effect. Constitution Saving Throw: DC 11. First Failure The target has the Restrained ll's stress. Once the djinni has cast it three times, the djinni can't do so again for 365 days.","actions":"Create Whirlwind. The djinni conjures a whirlwind at a point it can see within 120 feet. The whirlwind fills a 20-foot-radius, 60-foot-high Cylinder [Area of Effect]|XPHB|Cylinder centered on that point. The whirlwind lasts until the djinni's Concentration on it ends. The djinni can move the whirlwind up to 20 feet at the start of each of its turns. Whenever the whirlwind enters a creature's space or a creature enters the whirlwind, that creature is subjected to the following effect. Strength Saving Throw: DC 17 (a creature makes this save only once per turn, and the djinni is unaffected). Failure: While in the whirlwind, the target has the Restrained condition and moves with the whirlwind. At the start of each of its turns, the Restrained target takes 21 (6d6) Thunder damage. At the end of each of its turns, the target repeats the save, ending the effect on itself on a success.\nMultiattack. The djinni makes three attacks, using Storm Blade or Storm Bolt in any combination.\nSpellcasting. The djinni casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 17):\n\n- **At Will:** Detect Evil and Good, Detect Magic\n- **2/Day Each:** Create Food and Water, Tongues, Wind Walk\n- **1/Day Each:** Creation, Gaseous Form, Invisibility, Major Image, Plane Shift\nStorm Blade. Melee Attack Roll: +9, reach 5 feet. 12 (2d6 + 5) Slashing damage plus 7 (2d6) Lightning damage.\nStorm Bolt. Ranged Attack Roll: +9, range 120 feet. 13 (3d8) Thunder damage. If the target is a Large or smaller creature, it has the Prone condition.","legendary":""},{"name":"Doppelganger","meta":"Medium monstrosity, neutral","ac":"14 (natural armor)","hp":52,"hpRoll":"8d8 + 16","speed":"9 m","str":11,"dex":18,"con":14,"int":11,"wis":12,"cha":14,"saves":"","skills":"Inganno +6, Intuizione +3","resist":"","senses":"scurovisione alness\nHorrific Visage. Wisdom Saving Throw: DC 13, each creature in a 60-foot Cone that can see the ghost and isn't an Undead. Failure: 10 (2d6 + 3) Psychic damage, and the target has the Frightened condition until the start of the ghost's next turn. Success: The target is immune to this ghost's Horrific Visage for 24 hours.\nMultiattack. The ghost makes two Withering Touch attacks.\nPossession. Charisma Saving Throw: DC 13, one Humanoid the ghost can see within 5 feet. Failure: The target is possessed by the ghost; the ghost disappears, and the target has the Incapacitated condition and loses control of its body. The ghost now controls the body, but the target retains awareness. The ghost can't be targeted by any attack, spell, or other effect, except ones that specifically target Undead. The ghost's game statistics are the same, except it uses the possessed target's Speed, as well as the target's Strength, Dexterity, and Constitution modifiers. The possession lasts until the body drops to 0 Hit Points or the ghost leaves as a Bonus Action. When the possession ends, the ghost appears in an unoccupied space within 5 feet of the target, and the target is immune to this ghost's Possession for 24 hours. Success: The target is immune to this ghost's Possession for 24 hours.\nWithering Touch. Melee Attack Roll: +5, reach 5 ft. 19 (3d10 + 3) Necrotic damage.","legendary":""},{"name":"Ghoul","meta":"Medium undead, chaotic evil","ac":"12 (natural armor)","hp":22,"hpRoll":"5d8","speed":"9 m","str":13,"dex":15,"con":10,"int":7,"wis":10,"cha":6,"saves":"","skills":"","resist":"Immunità: poison; Immunità condizioni: charmed, exhaustion, poisoned","senses":"scurovisione 18 m, Percezione passiva 10","langs":"Common","cr":"1 (200 PE)","traits":"","actions":"Bite. Melee Attack Roll: +4, reach 5 ft. 5 (1d6 + 2) Piercing damage plus 3 (1d6) Necrotic damage.\nClaw. Melee Attack Roll: +4, reach 5 ft. 4 (1d4 + 2) Slashing damage. If the target is a creature that isn't an Undead or elf ,"actions":"Fling. The kraken throws a Large or smaller creature Grappled by it to a space it can see within 60 feet of itself that isn't in the air. Dexterity Saving Throw: DC 25, the creature thrown and each creature in the destination space. Failure: 18 (4d8) Bludgeoning damage, and the target has the Prone condition. Success: Half damage only.\nLightning Strike. Dexterity Saving Throw: DC 23, one creature the kraken can see within 120 feet. Failure: 33 (6d10) Lightning damage. Success: Half damage.\nMultiattack. The kraken makes two Tentacle attacks and uses Fling, Lightning Strike, or Swallow.\nSwallow. Dexterity Saving Throw: DC 25, one creature Grappled by the kraken (it can have up to four creatures swallowed at a time). Failure: 23 (3d8 + 10) Piercing damage. If the target is Large or smaller, it is swallowed and no longer Grappled. A swallowed creature has the Restrained condition, has Cover|XPHB|Total Cover against attacks and other effects outside the kraken, and takes 24 (7d6) Acid damage at the start of each of its turns. If the kraken takes 50 damage or more on a single turn from a creature inside it, the kraken must succeed on a DC 25 Constitution saving throw at the end of that turn or regurgitate all swallowed creatures, each of which falls in a space within 10 feet of the kraken with the Prone condition. If the kraken dies, any swallowed creature no longer has the Restrained condition and can escape from the corpse using 15 feet of movement, exiting Prone.\nTentacle. Melee Attack Roll: +17, reach 30 ft. 24 (4d6 + 10) Bludgeoning damage. The target has the Grappled condition (escape DC 20) from one of ten tentacles, and it has the Restrained condition until the grapple ends.","legendary":"Storm Bolt. The kraken uses Lightning Strike.\nToxic Ink. Constitution Saving Throw: DC 23, each creature in a 15-foot Emanation originating from the kraken while it is underwater. Failure: The target has the Blinded and Poisoned conditions until the end of the kraken's next turn. The kraken then moves up to its Speed. Failure or Success: The kraken can't take this action again until the start of its next turn."},{"name":"Lamia","meta":"Large fiend, chaotic evil","ac":"13 (natural armor)","hp":97,"hpRoll":"13d10 + 26","speed":"12 m","str":16,"dex":13,"con":15,"int":14,"wis":15,"cha":16,"saves":"","skills":"Inganno +7, Intuizione +4, Furtività +5","resist":"","senses":"scurovisione 18 m, Percezione passiva 12","langs":"Abyssal, Common","cr":"4 (1100 PE)","traits":"","actions":"Claw. Melee Attack Roll: +5, reach 5 ft. 7 (1d8 + 3) Slashing damage plus 7 (2d6) Psychic damage.\nCorrupting Touch. Wisdom Saving Throw: DC 13, one creature the lamia can see within 5 feet. Failure: 13 (3d8) Psychic damage, and the target is cursed for 1 hour. Until the curse ends, the target has the Charmed and Poisoned conditions.\nMultiattack. The lamia makes two Claw attacks. It can replace one attack with a use of Corrupting Touch.\nSpellcasting. The lamia casts one of the following spells, requiring no Material components and using Charisma as the spellcasting ability (spell save DC 13):\n\n- **At Will:** Disguise Self, Minor Illusion\n- **1/Day Each:** Geas, Major Image, Scrying\nAZIONI BONUS:\nLeap. The lamia jumps up to 30 feet by spending 10 feet of movement.","legendary":""},{"name":"Lemure","meta":"Medium fiend, lawful evil","ac":"9 (natural armor)","hp":9,"hpRoll":"2d8","speed":"6 m","str":10,"dex":5,"con":11,"int":1,"wis":11,"cha":3,"saves":"","skills":"","resist":"Resistenze: cold; Immunità: fire, poison; Immunità condizioni: charmed, frightened, poisoned","senses":"scurovisione 36 m, Percezione passiva 10","langs":"Understands Infernal but can't speak","cr":"0 (10 PE)","traits":"Hellish Restoration. If the lemure dies in the Nine Hells, it revives with all its Hit Points in 1d10 days unless it is killed by a creature under the effects of a Bless spell or its remains are sprinkled with Holy Water.","actions":"Vile Slime. Melee Attack Rol <script>
"use strict";

/* ==================== persistenza sicura ==================== */
const memStore = {};
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return memStore[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ memStore[k]=v; return false; } },
  del(k){ try{ localStorage.removeItem(k); }catch(e){ delete memStore[k]; } }
};
const SAVE_KEY = "runebog-gm-v1";
let persistent = true;

/* ==================== modello dati ==================== */
/* --- temi: scelti qui, ricordati, e validi anche sul sito (stessa chiave) --- */
const TEMI = ["torbiera","pergamena","cripta","brace","contrasto"];

function setTheme(nome){
  if(!TEMI.includes(nome)) nome = "torbiera";
  // "torbiera" è il default in themes.css: nessun attributo = tema di base.
  if(nome === "torbiera") delete document.documentElement.dataset.theme;
  else document.documentElement.dataset.theme = nome;
  try{ localStorage.setItem("runebog-theme", nome); }catch(e){}
  const sel = document.getElementById("theme-select");
  if(sel) sel.value = nome;
}

// Allinea il menu a ciò che lo script in <head> ha già applicato prima del disegno.
addEventListener("DOMContentLoaded", ()=>{
  let salvato = "torbiera";
  try{ salvato = localStorage.getItem("runebog-theme") || "torbiera"; }catch(e){}
  setTheme(salvato);
});

const TYPES = {
  zona:      {label:"Zona",      color:"var(--fen)"},
  luogo:     {label:"Luogo",     color:"var(--teal)"},
  quest:     {label:"Quest",     color:"var(--gold)"},
  encounter: {label:"Encounter", color:"var(--ember)"},
  png:       {label:"PNG",       color:"var(--viola)"},
  token:     {label:"Token",     color:"var(--ink)"},
  nota:      {label:"Nota",      color:"var(--grigio)"}
};
const TOKEN_COLORS = ["#8fd4a8","#6cc3c9","#d8b25a","#d0765a","#b393c9","#e8e3d8"];
const STATUSES = ["", "da fare", "in corso", "fatto"];

const uid = () => Math.random().toString(36).slice(2,10);
const node = (title, type="zona") => ({id:uid(), title, type, status:"", notes:"", img:null, children:[], edges:[], x:null, y:null, shape:null});

function defaultState(){
  const root = node("Runebog","zona");
  root.notes = "Città sulle paludi. One-shot di compleanno — 11 luglio.";
  root.children = [
    node("Distretto 1","zona"),
    node("Distretto 2","zona"),
    node("Distretto 3","zona"),
    node("Distretto 4","zona"),
    node("Distretto 5","zona")
  ];
  return {
    root,
    checklist: [
      {id:uid(), text:"Stampare le schede dei personaggi", done:false},
      {id:uid(), text:"Ripassare gli encounter principali", done:false}
    ],
    players: []
  };
}

/* ==================== campagne multiple ==================== */
const IDX_KEY = "gm-campaigns-v1";
const CUR_KEY = "gm-current-campaign";
const ckey = id => "gm-campaign-" + id;
let campaignsIdx = [];
let campaignId = null;

function loadCampaignsIdx(){ try{ return JSON.parse(store.get(IDX_KEY)) || []; }catch(_){ return []; } }
function persistIndex(){ store.set(IDX_KEY, JSON.stringify(campaignsIdx)); }
function emptyState(name){
  return { root: node(name || "Nuova campagna", "zona"), checklist: [], players: [] };
}
function persistCurrent(){
  if(window.__cloud || !campaignId) return;
  store.set(ckey(campaignId), JSON.stringify(state));
  const c = campaignsIdx.find(x=>x.id===campaignId);
  if(c){ c.name = state.root.title || "Campagna"; c.updatedAt = Date.now(); persistIndex(); }
}
function renderCampaignSelect(){
  const s = document.getElementById("campaign-select");
  if(!s) return;
  s.innerHTML = campaignsIdx.map(c=>
    `<option value="${c.id}"${c.id===campaignId?" selected":""}>${escapeHtml(c.name)}</option>`).join("");
}
function switchCampaign(id){
  if(id===campaignId || window.__cloud) return;
  clearTimeout(saveTimer); persistCurrent();
  campaignId = id; store.set(CUR_KEY, id);
  try{ const raw = store.get(ckey(id)); state = raw ? JSON.parse(raw) : emptyState(); }
  catch(_){ state = emptyState(); }
  migrateState(state);
  path = [state.root.id]; selectedId = null; selectedEdgeId = null; multiSel.clear();
  renderCampaignSelect(); showView("map");
}
function newCampaign(){
  if(window.__cloud) return;
  clearTimeout(saveTimer); persistCurrent();
  const id = uid();
  campaignsIdx.push({id, name:"Nuova campagna", updatedAt: Date.now()});
  campaignId = id; store.set(CUR_KEY, id);
  state = emptyState();
  persistCurrent(); renderCampaignSelect();
  path = [state.root.id]; selectedId = null; selectedEdgeId = null; multiSel.clear();
  showView("map");
  setTimeout(()=>{ const i=document.querySelector("#detail input"); if(i){ i.focus(); i.select(); } }, 80);
}
function askDeleteCampaign(){
  if(window.__cloud) return;
  if(campaignsIdx.length<=1){ alert("È l'unica campagna: creane un'altra prima di poterla eliminare."); return; }
  document.getElementById("confirm-text").textContent =
    `Eliminare la campagna "${state.root.title||"senza nome"}"? Operazione definitiva (fai prima un Esporta se hai dubbi).`;
  openConfirm(ok=>{
    if(!ok) return;
    store.del(ckey(campaignId));
    campaignsIdx = campaignsIdx.filter(c=>c.id!==campaignId);
    persistIndex();
    const next = campaignsIdx[0].id;
    campaignId = null;                    // forza il ricaricamento
    switchCampaign(next);
  });
}

let state;
if(window.__cloud && window.__cloud.state){
  state = window.__cloud.state;                 // il sito fornisce lo stato: niente slot locali
}else{
  campaignsIdx = loadCampaignsIdx();
  const legacy = store.get(SAVE_KEY);           // migrazione dal salvataggio singolo pre-campagne
  if(!campaignsIdx.length && legacy){
    const id0 = uid();
    store.set(ckey(id0), legacy);
    let nm = "Campagna";
    try{ nm = JSON.parse(legacy).root?.title || nm; }catch(_){}
    campaignsIdx = [{id: id0, name: nm, updatedAt: Date.now()}];
    persistIndex();
  }
  if(!campaignsIdx.length){
    const id0 = uid();
    campaignsIdx = [{id: id0, name: "La mia campagna", updatedAt: Date.now()}];
    persistIndex();
    store.set(ckey(id0), JSON.stringify(defaultState()));
  }
  campaignId = store.get(CUR_KEY);
  if(!campaignsIdx.some(c=>c.id===campaignId)) campaignId = campaignsIdx[0].id;
  try{
    const raw = store.get(ckey(campaignId));
    state = raw ? JSON.parse(raw) : emptyState();
  }catch(e){ state = emptyState(); }
}
migrateState(state);                                  // migrazione salvataggi vecchi

let path = [state.root.id];          // percorso di navigazione (id)
let selectedId = null;               // blocco selezionato nel livello corrente
let selectedEdgeId = null;           // collegamento selezionato nel livello corrente
let multiSel = new Set();            // selezione multipla (Ctrl+clic)
let detailOpen = false;              // bottom sheet aperto manualmente (mobile)
let saveTimer = null;

let cloudBusy = false, cloudDirty = false;
async function cloudPush(){
  if(!window.__cloud) return;
  if(cloudBusy){ cloudDirty = true; return; }
  cloudBusy = true;
  const el = document.getElementById("savestate");
  try{
    const res = await fetch(`/api/campaigns/${window.__cloud.id}`, {
      method: "PATCH",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({data: state})
    });
    if(!res.ok) throw new Error(res.status);
    el.textContent = "Salvato nel cloud ✓";
    el.style.color = "var(--ink-dim)";
  }catch(_){
    el.textContent = "Offline — salvato in locale";
    el.style.color = "var(--gold)";
  }finally{
    cloudBusy = false;
    if(cloudDirty){ cloudDirty = false; cloudPush(); }
  }
}
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    if(window.__cloud){
      store.set(SAVE_KEY, JSON.stringify(state));    // cache offline
      cloudPush(); return;
    }
    persistent = store.set(ckey(campaignId), JSON.stringify(state));
    const c = campaignsIdx.find(x=>x.id===campaignId);
    if(c){
      const nm = state.root.title || "Campagna";
      if(c.name !== nm){ c.name = nm; renderCampaignSelect(); }
      c.updatedAt = Date.now();
    }
    persistIndex();
    const el = document.getElementById("savestate");
    el.textContent = persistent ? "Salvato ✓" : "Solo in memoria — usa Esporta";
    el.style.color = persistent ? "var(--ink-dim)" : "var(--gold)";
  }, 700);
}

/* ==================== utilità albero ==================== */
function findNode(id, cur=state.root){
  if(cur.id===id) return cur;
  for(const c of cur.children){ const f=findNode(id,c); if(f) return f; }
  return null;
}
function findParent(id, cur=state.root){
  if(cur.children.some(c=>c.id===id)) return cur;
  for(const c of cur.children){ const f=findParent(id,c); if(f) return f; }
  return null;
}
function migrateState(s){
  (function walk(n){
    if(!Array.isArray(n.edges)) n.edges=[];
    (n.children||[]).forEach(walk);
  })(s.root);
  // vecchia "Pianta" separata → diventa una zona dentro la radice
  if(s.plan && Array.isArray(s.plan.blocks) && s.plan.blocks.length){
    const z = node("Pianta città (bozza)","zona"); z.shape="quartiere";
    z.children = s.plan.blocks.map(b=>({id:b.id, title:b.label||"", type:"luogo", status:"",
      notes:b.notes||"", img:null, children:[], edges:[], x:b.x, y:b.y, shape:b.shape}));
    z.edges = (s.plan.edges||[]).slice();
    s.root.children.push(z);
  }
  delete s.plan;
}
function currentNode(){ return findNode(path[path.length-1]) || state.root; }
function pathNodes(){ return path.map(id=>findNode(id)).filter(Boolean); }

/* ==================== viste ==================== */
function showView(v){
  document.querySelectorAll(".view").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("view-"+v).classList.add("active");
  document.getElementById("tab-"+v).classList.add("active");
  if(v==="map") renderMap();
  if(v==="quests") renderQuests();
  if(v==="check") renderChecklist();
  if(v==="players") renderPlayers();
}

/* ==================== mappa: rendering bolle ==================== */
function renderMap(){
  renderCrumbs();
  renderCanvas();
  renderDetail();
}

function renderCrumbs(){
  const wrap = document.getElementById("crumbs");
  wrap.innerHTML = "";
  const nodes = pathNodes();
  nodes.forEach((n,i)=>{
    if(i>0){
      const sep = document.createElement("span");
      sep.className="sep"; sep.textContent="›";
      wrap.appendChild(sep);
    }
    if(i===nodes.length-1){
      const here = document.createElement("span");
      here.className="here serif"; here.textContent=n.title||"(senza nome)";
      wrap.appendChild(here);
    }else{
      const b = document.createElement("button");
      b.textContent = n.title||"(senza nome)";
      b.onclick = ()=>{ path = path.slice(0,i+1); selectedId=null; renderMap(); };
      wrap.appendChild(b);
    }
  });
  if(nodes.length>1){
    const back = document.createElement("button");
    back.textContent = "↩ Su";
    back.style.marginLeft="auto";
    back.onclick = goUp;
    wrap.appendChild(back);
  }
}

function goUp(){
  if(path.length>1){
    selectedId = path[path.length-1]; selectedEdgeId = null;
    multiSel = new Set([selectedId]);
    path.pop(); renderMap();
  }
}

function enterNode(id){
  path.push(id); selectedId = null; selectedEdgeId = null; multiSel.clear(); renderMap();
}

/* ==================== pannello dettaglio ==================== */
function renderDetail(){
  const aside = document.getElementById("detail");
  const cur = currentNode();

  // pannello di un collegamento selezionato
  if(selectedEdgeId){
    const e = (cur.edges||[]).find(x=>x.id===selectedEdgeId);
    if(!e){ selectedEdgeId = null; }
    else{
      const a = findNode(e.a), b = findNode(e.b);
      const et = EDGE_TYPES[e.type]||EDGE_TYPES.strada;
      const typeOpts = Object.entries(EDGE_TYPES)
        .map(([k,v])=>`<option value="${k}" ${k===e.type?"selected":""}>${v.label}</option>`).join("");
      aside.innerHTML = `<div class="inner">
        <div>
          <span style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:${et.stroke}">
            <span class="type-badge" style="background:${et.stroke}"></span>Collegamento
          </span>
          <h2>${escapeHtml(a?.title||"(senza nome)")} ↔ ${escapeHtml(b?.title||"(senza nome)")}</h2>
        </div>
        <div class="field"><label>Tipo</label>
          <select onchange="editEdge('${e.id}','type',this.value)">${typeOpts}</select></div>
        <div class="field"><label>Etichetta (visibile sulla pianta)</label>
          <input value="${escapeAttr(e.label||"")}" oninput="editEdge('${e.id}','label',this.value)" placeholder="Es. Via del Mercato"></div>
        <div class="field"><label>Note</label>
          <textarea oninput="editEdge('${e.id}','notes',this.value)" placeholder="Macerie, posto di blocco, encounter legato alla strada…">${escapeHtml(e.notes||"")}</textarea></div>
        <div class="detail-actions">
          <button class="btn danger" onclick="deleteEdge('${e.id}')">Elimina collegamento</button>
        </div>
      </div>`;
      return;
    }
  }

  if(multiSel.size>1){
    const nodes = [...multiSel].map(id=>findNode(id)).filter(Boolean);
    aside.innerHTML = `<div class="inner">
      <div><h2>${nodes.length} blocchi selezionati</h2></div>
      <div class="field"><div class="child-list">${nodes.map(x=>`<div class="child">
        <span class="type-badge" style="background:${(TYPES[x.type]||TYPES.nota).color}"></span>${escapeHtml(x.title||"(senza nome)")}
      </div>`).join("")}</div></div>
      <p style="color:var(--ink-dim);font-size:12px;line-height:1.5">
        Trascina uno qualsiasi dei blocchi per spostarli insieme · Frecce per ritocchi fini · Canc per eliminarli · Esc per deselezionare
      </p>
      <div class="detail-actions">
        <button class="btn danger" onclick="requestDeleteSelection()">Elimina selezionati</button>
      </div>
    </div>`;
    return;
  }

  const sel = selectedId ? findNode(selectedId) : null;
  const n = sel || cur;
  const isRoot = (n.id === state.root.id);
  const t = TYPES[n.type] || TYPES.nota;

  const typeOpts = Object.entries(TYPES)
    .map(([k,v])=>`<option value="${k}" ${k===n.type?"selected":""}>${v.label}</option>`).join("");
  const statusOpts = STATUSES
    .map(s=>`<option value="${s}" ${s===n.status?"selected":""}>${s||"—"}</option>`).join("");
  const shapeOpts = Object.entries(SHAPES)
    .map(([k,v])=>`<option value="${k}" ${(n.shape||defShape(n))===k?"selected":""}>${v.label}</option>`).join("");

  const childRows = n.children.map(c=>{
    const cc = (TYPES[c.type]||TYPES.nota).color;
    return `<div class="child" onclick="jumpTo('${n.id}','${c.id}')">
      <span class="type-badge" style="background:${cc}"></span>${escapeHtml(c.title||"(senza nome)")}
      ${c.status?`<span class="st">${c.status}</span>`:""}
    </div>`;
  }).join("");

  aside.innerHTML = `<div class="inner">

/* ==================== schede mostro (D&D 5e SRD) ==================== */
const ABILITIES = [["str","FOR"],["dex","DES"],["con","COS"],["int","INT"],["wis","SAG"],["cha","CAR"]];
const abMod = v => { const m = Math.floor(((+v||10)-10)/2); return (m>=0?"+":"")+m; };

function newFoe(name="Nemico", hp=10){ return {id:uid(), name, hp, hpMax:hp}; }
function ensureMon(n){
  if(!n.monster) n.monster = {};
  const m = n.monster;
  // migrazione dal vecchio formato Dungeon World
  if(m.kind!==undefined && m.meta===undefined){
    m.meta = m.kind || "";
    m.traits = m.special || "";
    m.actions = [m.actions, (m.moves||"")].filter(Boolean).join("\n");
  }
  const defaults = {meta:"", ac:"", speed:"", str:10, dex:10, con:10, int:10, wis:10, cha:10,
    saves:"", skills:"", resist:"", senses:"", langs:"", cr:"", traits:"", actions:"", legendary:"",
    hpDefault:10, foes:[]};
  for(const k in defaults) if(m[k]===undefined) m[k]=defaults[k];
  return m;
}
function editMon(id, key, val){
  const n = findNode(id); if(!n) return;
  ensureMon(n)[key] = val;
  save();
}
function addFoe(id){
  const n = findNode(id); if(!n) return;
  const m = ensureMon(n);
  const base = m.foes[m.foes.length-1];
  const f = newFoe(n.title||"Nemico", base ? base.hpMax : (m.hpDefault||10));
  if(base){
    f.name = base.name.replace(/\s*\d+$/,"") + " " + (m.foes.length+1);
    if(m.foes.length===1 && !/\d$/.test(m.foes[0].name)) m.foes[0].name += " 1";
  }
  m.foes.push(f);
  save(); renderDetail();
}
function editFoe(id, foeId, key, val){
  const n = findNode(id); if(!n||!n.monster) return;
  const f = n.monster.foes.find(x=>x.id===foeId); if(!f) return;
  f[key] = val;
  if(key==="hpMax" && f.hp>val) f.hp = val;
  save();
  if(key==="hp"||key==="hpMax") renderFoeHP(id, foeId);
}
function bumpFoeHP(id, foeId, delta){
  const n = findNode(id); if(!n||!n.monster) return;
  const f = n.monster.foes.find(x=>x.id===foeId); if(!f) return;
  f.hp = Math.max(0, Math.min(f.hpMax, f.hp+delta));
  save(); renderFoeHP(id, foeId);
}
function removeFoe(id, foeId){
  const n = findNode(id); if(!n||!n.monster) return;
  n.monster.foes = n.monster.foes.filter(x=>x.id!==foeId);
  save(); renderDetail();
}
function renderFoeHP(id, foeId){
  const f = findNode(id)?.monster?.foes.find(x=>x.id===foeId); if(!f) return;
  const wrap = document.querySelector(`[data-foehp="${foeId}"]`); if(!wrap) return;
  const pct = f.hpMax ? Math.round(100*f.hp/f.hpMax) : 0;
  const col = pct>50 ? "#8fd4a8" : pct>25 ? "#d8b25a" : "#d0765a";
  wrap.querySelector(".hpbar-fill").style.width = pct+"%";
  wrap.querySelector(".hpbar-fill").style.background = col;
  const num = wrap.querySelector(".hp-now"); if(num) num.value = f.hp;
  const g = wrap.closest(".foe-card"); if(g) g.classList.toggle("dead", f.hp<=0);
  // aggiorno anche l'intestazione (vivi / PF totali) senza ridisegnare tutto
  const m = findNode(id)?.monster;
  const head = document.querySelector(".foe-head span");
  if(m && head && m.foes.length>1){
    const alive = m.foes.filter(x=>x.hp>0).length;
    const total = m.foes.reduce((s,x)=>s+x.hp,0);
    head.textContent = `${alive}/${m.foes.length} in vita · ${total} PF totali`;
  }
}

/* --- ricerca nel bestiario SRD --- */
function srdSearch(id, q){
  const box = document.getElementById("srd-results"); if(!box) return;
  q = (q||"").trim().toLowerCase();
  if(q.length<2 || !window.SRD_MONSTERS){ box.classList.remove("show"); return; }
  const hits = window.SRD_MONSTERS.filter(m=>m.name.toLowerCase().includes(q)).slice(0,8);
  if(!hits.length){ box.classList.remove("show"); return; }
  box.innerHTML = hits.map(m=>{
    const i = window.SRD_MONSTERS.indexOf(m);
    return `<button onclick="applySRD('${id}',${i})">${escapeHtml(m.name)}
      <span class="srd-cr">GS ${escapeHtml(m.cr)}</span></button>`;
  }).join("");
  box.classList.add("show");
}
function applySRD(id, idx){
  const n = findNode(id); if(!n) return;
  const s = window.SRD_MONSTERS[idx]; if(!s) return;
  const m = ensureMon(n);
  Object.assign(m, {
    meta:s.meta, ac:s.ac, speed:s.speed,
    str:s.str, dex:s.dex, con:s.con, int:s.int, wis:s.wis, cha:s.cha,
    saves:s.saves, skills:s.skills, resist:s.resist, senses:s.senses,
    langs:s.langs, cr:s.cr, traits:s.traits, actions:s.actions, legendary:s.legendary,
    hpDefault:s.hp
  });
  if(!m.foes.length) m.foes.push(newFoe(s.name, s.hp));
  else m.foes.forEach(f=>{ f.hpMax = s.hp; f.hp = Math.min(f.hp, s.hp) || s.hp; });
  if(!n.title) editNode(id, "title", s.name);
  save(); renderDetail();
}

/* --- tiradadi --- */
function rollDice(expr){
  const m = String(expr).trim().match(/^(\d*)d(\d+)\s*([+-]\s*\d+)?$/i);
  const out = document.getElementById("dice-out"); if(!out) return;
  if(!m){ out.textContent = "formato: 2d6+3"; return; }
  const n = Math.min(50, +m[1]||1), faces = +m[2], mod = m[3]? +m[3].replace(/\s/g,"") : 0;
  const rolls = Array.from({length:n}, ()=>1+Math.floor(Math.random()*faces));
  const tot = rolls.reduce((a,b)=>a+b,0)+mod;
  out.innerHTML = `<b>${tot}</b> <span class="dice-detail">(${rolls.join("+")}${mod? (mod>0?"+":"")+mod:""})</span>`;
}

function foeCard(nodeId, f){
  const pct = f.hpMax ? Math.round(100*f.hp/f.hpMax) : 0;
  const col = pct>50 ? "#8fd4a8" : pct>25 ? "#d8b25a" : "#d0765a";
  return `<div class="foe-card ${f.hp<=0?"dead":""}">
    <div class="foe-top">
      <input class="foe-name" value="${escapeAttr(f.name)}" oninput="editFoe('${nodeId}','${f.id}','name',this.value)" placeholder="Nome">
      <button class="btn tiny danger" title="Rimuovi" onclick="removeFoe('${nodeId}','${f.id}')">✕</button>
    </div>
    <div class="foe-hp" data-foehp="${f.id}">
      <button class="btn tiny" onclick="bumpFoeHP('${nodeId}','${f.id}',-1)">−</button>
      <div class="hpbar"><div class="hpbar-fill" style="width:${pct}%;background:${col}"></div></div>
      <input class="hp-now" type="number" value="${f.hp}" min="0" max="${f.hpMax}"
        onchange="editFoe('${nodeId}','${f.id}','hp',Math.max(0,Math.min(${f.hpMax},parseInt(this.value)||0)))">
      <span class="hp-sep">/</span>
      <input class="hp-max" type="number" value="${f.hpMax}" min="1"
        onchange="editFoe('${nodeId}','${f.id}','hpMax',Math.max(1,parseInt(this.value)||1))">
      <button class="btn tiny" onclick="bumpFoeHP('${nodeId}','${f.id}',1)">+</button>
    </div>
  </div>`;
}

function editEdge(id, key, val){
  const cur = currentNode();
  const e = (cur.edges||[]).find(x=>x.id===id); if(!e) return;
  e[key] = val;
  save();
  if(key==="type"||key==="label") renderCanvas();   // l'input vive nel pannello: il focus non si perde
}
function deleteEdge(id){
  const cur = currentNode();
  cur.edges = (cur.edges||[]).filter(x=>x.id!==id);
  selectedEdgeId = null;
  save(); renderMap();
}

function jumpTo(parentId, childId){
  if(path[path.length-1] !== parentId) path.push(parentId);
  selectedId = childId;
  renderMap();
}

function editNode(id, key, val){
  const n = findNode(id); if(!n) return;
  n[key] = val;
  if(key==="type" && !isMarker(n) && !n.shape) n.shape = defShape(n);
  save();
  if(["title","type","status","shape","w","h","tokenColor"].includes(key)){ renderCrumbs(); renderCanvas(); }
  if(key==="type"||key==="img"||key==="main"||key==="tokenColor") renderDetail();
}

function addChild(id){
  const parent = id ? findNode(id) : currentNode();
  const c = node("Nuova bolla","nota");
  parent.children.push(c);
  if(parent.id !== currentNode().id && findNode(parent.id, currentNode())===parent){
    // il genitore è visibile nel livello corrente: seleziono il genitore per contesto
  }
  if(parent.id === currentNode().id){ selectedId = c.id; }
  save(); renderMap();
  // focus sul titolo per rinominare subito
  setTimeout(()=>{ const inp=document.querySelector("#detail input"); if(inp){inp.focus(); inp.select();} },50);
}

let pendingDelete = null;
function askDeleteNode(id){
  const n = findNode(id); if(!n || n.id===state.root.id) return;
  if(isEmptyNode(n)){ doDeleteNodes([id]); return; }   // bolla vuota: via subito, niente dialogo
  pendingDelete = {kind:"node", id};
  document.getElementById("confirm-text").textContent =
    `Eliminare "${n.title||"blocco"}" e tutto il suo contenuto?`;
  document.getElementById("confirm-dialog").showModal();
}
let confirmCb = null;
function openConfirm(cb){            // variante generica a callback (usata dalla Pianta)
  confirmCb = cb;
  document.getElementById("confirm-dialog").showModal();
}
function closeConfirm(yes){
  document.getElementById("confirm-dialog").close();
  if(confirmCb){ const cb=confirmCb; confirmCb=null; cb(yes); return; }
  if(!yes || !pendingDelete){ pendingDelete=null; return; }
  if(pendingDelete.kind==="node"){
    const id = pendingDelete.id;
    const par = findParent(id);
    if(par && Array.isArray(par.edges))
      par.edges = par.edges.filter(e=>e.a!==id && e.b!==id);
    removeNode(id, state.root);
    // se il nodo eliminato era nel percorso, torno al genitore valido
    const idx = path.indexOf(id);
    if(idx!==-1) path = path.slice(0, idx);
    if(!path.length) path=[state.root.id];
    if(selectedId===id) selectedId=null;
    save(); renderMap();
  }else if(pendingDelete.kind==="player"){
    state.players = state.players.filter(p=>p.id!==pendingDelete.id);
    save(); renderPlayers();
  }
  pendingDelete = null;
}
function removeNode(id, cur){
  const i = cur.children.findIndex(c=>c.id===id);
  if(i!==-1){ cur.children.splice(i,1); return true; }
  return cur.children.some(c=>removeNode(id,c));
}

/* immagini */
function pickImage(id){
  const inp = document.createElement("input");
  inp.type="file"; inp.accept="image/*";
  inp.onchange = ()=>{
    const f = inp.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{ compressImage(r.result, (data)=>{ editNode(id,"img",data); }); };
    r.readAsDataURL(f);
  };
  inp.click();
}
function compressImage(dataUrl, cb){
  const img = new Image();
  img.onload = ()=>{
    const MAX = 1400;
    let w=img.width, h=img.height;
    if(w>MAX||h>MAX){ const k=MAX/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
    const c=document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    cb(c.toDataURL("image/jpeg",0.82));
  };
  img.onerror = ()=>cb(dataUrl);
  img.src = dataUrl;
}
function openLightbox(id){
  const n = findNode(id); if(!n||!n.img) return;
  document.getElementById("lightbox-img").src = n.img;
  document.getElementById("lightbox").classList.add("show");
}

/* ==================== checklist ==================== */
function renderChecklist(){
  const list = document.getElementById("check-list");
  const done = state.checklist.filter(c=>c.done).length;
  document.getElementById("check-progress").textContent =
    state.checklist.length ? `${done} su ${state.checklist.length} completate` : "Nessuna voce ancora.";
  list.innerHTML = "";
  state.checklist.forEach(c=>{
    const div = document.createElement("div");
    div.className = "check-item"+(c.done?" done":"");
    const cb = document.createElement("input");
    cb.type="checkbox"; cb.checked=c.done;
    cb.onchange = ()=>{ c.done=cb.checked; save(); renderChecklist(); };
    const txt = document.createElement("input");
    txt.className="txt"; txt.value=c.text;
    txt.style.cssText="background:none;border:none;border-radius:0;padding:0";
    txt.oninput = ()=>{ c.text=txt.value; save(); };
    const del = document.createElement("button");
    del.className="icon-btn"; del.textContent="✕"; del.title="Elimina";
    del.onclick = ()=>{ state.checklist = state.checklist.filter(x=>x.id!==c.id); save(); renderChecklist(); };
    div.append(cb,txt,del);
    list.appendChild(div);
  });
}
function addCheck(){
  const inp = document.getElementById("check-input");
  const v = inp.value.trim(); if(!v) return;
  state.checklist.push({id:uid(), text:v, done:false});
  inp.value=""; save(); renderChecklist(); inp.focus();
}
document.getElementById("check-input").addEventListener("keydown",e=>{ if(e.key==="Enter") addCheck(); });

/* ==================== giocatori ==================== */

  const grid = document.getElementById("players-grid");

  if(!state.players.length){
    grid.innerHTML = `<p style="color:var(--ink-dim);grid-column:1/-1">Nessun giocatore ancora — aggiungine uno per tracciare PF e note durante la sessione.</p>`;
  }
  state.players.forEach(p=>{
    const card = document.createElement("div");
    card.className="pcard";
    const pct = p.hpMax>0 ? Math.max(0,Math.min(100, p.hp/p.hpMax*100)) : 0;
