# Cancello minimo per un repo pubblico: typecheck + build su ogni push e PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Valori fittizi: src/db/index.ts crea il client Neon all'import, quindi il
      # build li richiede, ma nessuna pagina statica interroga davvero il database.
      DATABASE_URL: "postgresql://ci:ci@ci.invalid/ci?sslmode=require"
      AUTH_SECRET: "ci-only-dummy-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next build
